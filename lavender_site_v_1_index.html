<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lavender — Calm Experiences</title>

  <!-- ================= DESIGN TOKENS ================= -->
  <style>
    :root {
      --primary:#6c4aa5;
      --secondary:#ae7abe;
      --accent:#bec5ea;
      --bg:#faf7fc;
      --surface:#ffffff;
      --text:#241b33;
      --muted:#6b5f82;
      --border:#e6e0f2;
      --radius:14px;
      --shadow:0 8px 24px rgba(0,0,0,0.06);
      --focus:0 0 0 3px rgba(174,122,190,.45);
    }

    [data-theme="dark"] {
      --bg:#120f1a;
      --surface:#1c1628;
      --text:#f5f2ff;
      --muted:#b9aee0;
      --border:#2a2140;
      --shadow:0 10px 30px rgba(0,0,0,0.35);
    }

    * { box-sizing:border-box; }
    html:focus-within { scroll-behavior:smooth; }
    @media (prefers-reduced-motion: reduce) { html:focus-within { scroll-behavior:auto; } }

    body {
      margin:0; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background:var(--bg); color:var(--text); line-height:1.6;
    }

    a { text-decoration:none; color:inherit; }
    img { max-width:100%; display:block; border-radius:10px; }

    /* ================= ACCESSIBILITY ================= */
    .skip-link {
      position:absolute; left:-9999px; top:auto;
    }
    .skip-link:focus { left:1rem; top:1rem; background:var(--surface); padding:.5rem 1rem; border-radius:8px; box-shadow:var(--shadow); }

    :focus-visible { outline:none; box-shadow:var(--focus); border-radius:8px; }

    /* ================= LAYOUT ================= */
    .container { max-width:1100px; margin:auto; padding:2rem 1rem; }
    .section { margin-bottom:2rem; }
    .grid { display:grid; gap:1rem; grid-template-columns:repeat(auto-fit,minmax(240px,1fr)); }

    header {
      position:sticky; top:0; z-index:1000;
      display:flex; justify-content:space-between; align-items:center;
      padding:.8rem 1.2rem; background:var(--surface);
      box-shadow:var(--shadow);
    }

    .brand { font-weight:700; letter-spacing:.3px; }

    nav { display:flex; align-items:center; }
    nav a { margin:0 .5rem; padding:.4rem .6rem; border-radius:8px; }
    nav a.active { background:var(--accent); }

    .nav-actions button { margin-left:.4rem; }

    footer { text-align:center; padding:2rem; background:var(--surface); margin-top:2rem; border-top:1px solid var(--border); }

    /* ================= COMPONENTS ================= */
    .btn {
      display:inline-block; padding:.6rem 1rem; border-radius:10px;
      background:var(--primary); color:white; border:none; cursor:pointer;
      transition:transform .15s ease, opacity .15s ease;
    }
    .btn.secondary { background:var(--secondary); }
    .btn.ghost { background:transparent; color:var(--primary); border:1px solid var(--border); }
    .btn:hover { opacity:.92; transform:translateY(-1px); }

    .card {
      background:var(--surface); border-radius:var(--radius); padding:1rem;
      box-shadow:var(--shadow); border:1px solid var(--border);
      transition:transform .2s ease, box-shadow .2s ease;
    }
    .card:hover { transform:translateY(-6px); box-shadow:0 14px 40px rgba(0,0,0,0.08); }

    .card h3 { margin:.4rem 0; }
    .card p { color:var(--muted); font-size:.95rem; }

    .badge {
      display:inline-block; background:var(--accent); padding:.2rem .5rem;
      border-radius:999px; font-size:.75rem; margin-bottom:.3rem;
    }

    .hero {
      display:grid; gap:1.5rem; align-items:center;
      grid-template-columns:1.2fr 1fr;
    }
    .hero h1 { font-size:2rem; margin-bottom:.5rem; }
    .hero p { color:var(--muted); }

    form label { font-size:.9rem; display:block; margin-top:.6rem; }
    input, textarea {
      width:100%; padding:.6rem; border-radius:8px;
      border:1px solid var(--border); margin-top:.3rem;
      background:var(--surface); color:var(--text);
    }

    .gallery img { aspect-ratio:1/1; object-fit:cover; }

    /* ================= UTIL ================= */
    .fade { animation:fade .25s ease; }
    @keyframes fade { from {opacity:0;} to {opacity:1;} }

    /* ================= MOBILE ================= */
    #nav { display:flex; }
    #nav.active { display:block; }

    @media (max-width:800px) {
      .hero { grid-template-columns:1fr; }
    }

    @media (max-width:700px) {
      #nav { display:none; flex-direction:column; background:var(--surface); position:absolute; top:60px; right:10px; padding:1rem; border-radius:12px; box-shadow:var(--shadow); }
      nav a { padding:.5rem 0; }
    }
  </style>
</head>
<body>

<a href="#home" class="skip-link">Skip to content</a>

<header>
  <div class="brand">Lavender</div>

  <nav id="nav" aria-label="Main navigation">
    <a href="#home">Home</a>
    <a href="#events">Events</a>
    <a href="#photos">Photos</a>
    <a href="#blogs">Blogs</a>
    <a href="#shop">Shop</a>
    <a href="#reviews">Reviews</a>
    <a href="#about">About</a>
    <a href="#contact">Contact</a>
  </nav>

  <div class="nav-actions">
    <button onclick="toggleTheme()" aria-label="Toggle dark mode">🌙</button>
    <button onclick="toggleMenu(this)" aria-expanded="false" aria-controls="nav">☰</button>
  </div>
</header>

<main id="app" class="container"></main>

<footer>
  <p>© 2026 Lavender Site • Built with simplicity</p>
</footer>

<script>
/* ================= STATE ================= */
const state = {
  theme: localStorage.getItem('theme') || 'light'
};

if(state.theme==='dark') document.documentElement.setAttribute('data-theme','dark');

/* ================= DATA ================= */
const data = {
  events:[
    {title:"Spring Meetup", tag:"Community", desc:"Meet like-minded people."},
    {title:"Workshop", tag:"Learning", desc:"Hands-on creative session."},
    {title:"Launch Night", tag:"Event", desc:"Celebrate new beginnings."}
  ],
  blogs:[
    {title:"Design Trends", tag:"UI", desc:"Modern visual ideas."},
    {title:"Minimalism", tag:"UX", desc:"Less is more."},
    {title:"Accessibility", tag:"A11y", desc:"Design for everyone."}
  ],
  products:[
    {title:"Lavender Candle", desc:"Calming aroma"},
    {title:"Notebook", desc:"Minimal journaling"},
    {title:"Art Print", desc:"Soft abstract art"}
  ]
};

/* ================= COMPONENTS ================= */
const components = {
  card:(item)=>`
    <article class="card">
      <span class="badge">${item.tag||"Item"}</span>
      <h3>${item.title}</h3>
      <p>${item.desc||""}</p>
    </article>
  `
};

/* ================= PAGES ================= */
const pages = {
  home:()=>`
    <section class="hero fade">
      <div>
        <h1>Calm, curated experiences</h1>
        <p>Explore events, stories, and products in a soft lavender aesthetic.</p>
        <a class="btn" href="#events">Explore</a>
      </div>
      <img src="https://picsum.photos/500/400" alt="Lavender themed visual">
    </section>
  `,

  events:()=>`
    <section class="section fade">
      <h2>Events</h2>
      <div class="grid">${data.events.map(components.card).join('')}</div>
    </section>
  `,

  photos:()=>`
    <section class="section fade">
      <h2>Gallery</h2>
      <div class="grid gallery">
        ${[1,2,3,4,5,6].map(i=>`<img src="https://picsum.photos/300?${i}" alt="Gallery image ${i}">`).join('')}
      </div>
    </section>
  `,

  blogs:()=>`
    <section class="section fade">
      <h2>Blogs</h2>
      <div class="grid">${data.blogs.map(components.card).join('')}</div>
    </section>
  `,

  shop:()=>`
    <section class="section fade">
      <h2>Shop</h2>
      <div class="grid">${data.products.map(components.card).join('')}</div>
    </section>
  `,

  reviews:()=>`
    <section class="section fade">
      <h2>Reviews</h2>
      <div class="grid">
        ${["Amazing experience","Loved the vibe","Highly recommended"].map(r=>`<div class="card"><p>${r}</p></div>`).join('')}
      </div>
    </section>
  `,

  about:()=>`
    <section class="section fade">
      <h2>About</h2>
      <p>We focus on creating simple, calming digital experiences using minimal design and thoughtful interaction.</p>
    </section>
  `,

  contact:()=>`
    <section class="section fade">
      <h2>Contact</h2>
      <form onsubmit="event.preventDefault(); alert('Message sent!')">
        <label>Name<input required></label>
        <label>Email<input type="email" required></label>
        <label>Message<textarea required></textarea></label>
        <button class="btn">Send</button>
      </form>
    </section>
  `
};

/* ================= ROUTER ================= */
function router() {
  const route = location.hash.replace('#','') || 'home';
  document.getElementById('app').innerHTML = pages[route]?.() || pages.home();
  setActiveLink(route);
}

function setActiveLink(route) {
  document.querySelectorAll('nav a').forEach(a=>{
    a.classList.toggle('active', a.getAttribute('href') === '#'+route);
  });
}

window.addEventListener('hashchange', router);
window.addEventListener('load', router);

/* ================= UI ================= */
function toggleTheme() {
  const isDark = document.documentElement.toggleAttribute('data-theme');
  localStorage.setItem('theme', isDark ? 'dark':'light');
}

function toggleMenu(btn) {
  const nav = document.getElementById('nav');
  nav.classList.toggle('active');
  btn.setAttribute('aria-expanded', nav.classList.contains('active'));
}
</script>

</body>
</html>
